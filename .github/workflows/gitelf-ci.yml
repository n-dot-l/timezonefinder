name: GitElf CI

on:
  push:
    branches:
      - 'gitelf-*'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and project dependencies for unit tests
        run: |
          pip install uv
          # Install dev, numba, and test dependencies for Python 3.12 environment
          uv sync --group dev --group numba --group test

      - name: Run pre-commit checks (linting, formatting, static analysis)
        # This step executes pre-commit hooks to ensure code quality and consistency.
        # It's run via `uv run` to ensure it uses the dependencies installed by uv.
        # On failure, pre-commit will output detailed error messages directly to the logs.
        run: |
          uv run pre-commit run --all-files

      - name: Run unit tests (non-integration) via Tox
        # This step runs the 'py312-numba' tox environment, which executes unit tests.
        # Tox manages its own isolated environment and dependencies for this test run.
        # If tests fail, tox will exit with a non-zero code and its detailed output
        # (including pytest failures) will be visible in the build logs.
        run: |
          uv run tox -e py312-numba

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv and project dependencies for integration tests
        run: |
          pip install uv
          # Install dev and test dependencies for Python 3.13 environment
          uv sync --group dev --group test

      - name: Run integration tests via Tox
        # This step runs the 'integration' tox environment.
        # If tests fail, tox will exit with a non-zero code and its detailed output
        # (including pytest failures) will be visible in the build logs.
        run: |
          uv run tox -e integration
