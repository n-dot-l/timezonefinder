name: GitElf CI

on:
  push:
    branches:
      - gitelf-*

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run tests
        # Running unit tests for py3.13 and all integration tests
        run: uv run tox -e py313,integration
