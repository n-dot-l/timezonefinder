name: GitElf CI

on:
  push:
    branches:
      - 'gitelf-*'

jobs:
  pre-commit-hooks:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit hook
        uses: pre-commit/action@v3.0.1

  test-all:
    name: Run all tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system build dependencies
        # Required for building the CFFI extension used by timezonefinder
        run: sudo apt-get update && sudo apt-get install -y libffi-dev clang make

      - name: Create uv virtual environment
        run: uv venv

      - name: Install project and test dependencies
        # Install the project itself (including compiling C extensions via setup.py)
        # and all relevant test dependency groups.
        run: uv pip install .[test,numba,pytz]

      - name: Run all pytest tests
        # This command executes the entire test suite.
        # If tests fail, pytest will exit with a non-zero code,
        # and GitHub Actions will capture the detailed test failure logs.
        run: uv run pytest
