name: GitElf CI

on:
  push:
    branches:
      - gitelf-*

jobs:
  pre-commit-hooks:
    name: run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit hook
        uses: pre-commit/action@v3.0.1

  test:
    name: Run tests on Python 3.11
    runs-on: ubuntu-latest
    env:
      TOX_SKIP_MISSING_INTERPRETERS: False
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        run: |
          echo "INFO: Installing test dependencies..."
          uv sync --group test || { echo "::error::Failed to install test dependencies"; exit 1; }

      - name: Run tox
        run: |
          echo "INFO: Running tests with tox..."
          uv run tox -e "py311,py311-numba,py311-pytz" || { echo "::error::Tests failed."; exit 1; }
