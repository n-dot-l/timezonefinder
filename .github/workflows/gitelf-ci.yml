name: GitElf CI

on:
  push:
    branches:
      - 'gitelf-*'

jobs:
  pre-commit-hooks:
    name: run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit hook
        uses: pre-commit/action@v3.0.1

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        run: |
          echo "INFO: Installing test dependencies..."
          uv sync --group test
          echo "INFO: Dependencies installed."

      - name: Run tox tests
        run: |
          echo "INFO: Running tests for Python 3.12..."
          if ! uv run tox -e py312,py312-numba,py312-pytz,docs,integration; then
            echo "::error::Tests failed. This is expected if tests are not passing yet. The goal is to establish a working CI baseline."
            exit 1
          fi
