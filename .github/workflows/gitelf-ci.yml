name: GitElf CI

on:
  push:
    branches:
      - 'gitelf-*'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pre-commit hook
        id: pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        id: install
        run: uv sync --group test

      - name: Run tests with tox
        id: test
        run: uv run tox -e "py311,py311-numba,py311-pytz"

      - name: Report failure
        if: ${{ failure() }}
        run: |
          echo "::error::GitElf CI failed. Please check the logs."
          if [ "${{ steps.pre-commit.outcome }}" == "failure" ]; then
            echo "::error::The pre-commit hook step failed."
          fi
          if [ "${{ steps.install.outcome }}" == "failure" ]; then
            echo "::error::The dependency installation step failed."
          fi
          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            echo "::error::The test execution step failed."
          fi
