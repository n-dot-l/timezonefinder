name: GitElf CI

on:
  push:
    branches:
      - 'gitelf-*'

jobs:
  pre-commit-hooks:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit hook
        uses: pre-commit/action@v3.0.1

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: pre-commit-hooks # Ensure pre-commit checks pass before running tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        run: |
          echo "Installing test dependencies..."
          uv sync --group test
          echo "Test dependencies installed."

      - name: Generate timezone data files
        run: |
          bash parse_data.sh

      - name: Run tox environments (py312, numba, pytz, docs, integration)
        run: |
          echo "Starting test suite execution via tox..."
          # Redirect tox output to a file and print to stdout for full log visibility
          uv run tox -vv -e py312,py312-numba,py312-pytz,docs,integration 2>&1 | tee tox_output.log
          if [ $? -ne 0 ]; then
            echo "Tox tests failed. Full log:"
            cat tox_output.log
            exit 1
          fi
          echo "Test suite execution completed."
