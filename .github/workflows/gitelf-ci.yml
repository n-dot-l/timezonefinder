name: GitElf CI

on:
  push:
    branches:
      - 'gitelf-*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run tests with tox
        # Based on the existing build.yml, we run the tests for a representative python version.
        # We run the standard, numba, and pytz variants.
        run: uv run tox -e "py312,py312-numba,py312-pytz"
